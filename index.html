<!DOCTYPE html><html lang="zh-CN"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    <title>阿扶の 专属小窝</title>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">    <style>        :root {            /* 核心调色板：深空邃黑与流光紫/蓝 */            --bg-color: #050507;            --text-primary: #ffffff;            --text-secondary: rgba(255, 255, 255, 0.55);            /* 顶级物理阻尼曲线 */            --spring-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.15);            --spring-smooth: cubic-bezier(0.23, 1, 0.32, 1);            /* 真正的玻璃态参数 */            --glass-bg: linear-gradient(145deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.01) 100%);            --glass-border: rgba(255, 255, 255, 0.08);            --glass-highlight: inset 0 1px 1px rgba(255, 255, 255, 0.15); /* 顶部边缘高光，灵魂所在 */        }        * {            margin: 0; padding: 0; box-sizing: border-box;            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;            -webkit-tap-highlight-color: transparent; /* 去除安卓点击丑陋的默认高光 */        }        body {            background-color: var(--bg-color);            color: var(--text-primary);            min-height: 100vh;            display: flex; justify-content: center;            padding: 4vh 5vw 8vh;            overflow-x: hidden;            position: relative;        }        /* 1. 电影级流体氛围光晕 (Ambient Fluid Light) */        .ambient-bg {            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;            z-index: -2; overflow: hidden; background: #000;        }        .orb {            position: absolute; border-radius: 50%; filter: blur(80px);            opacity: 0.5; animation: fluidFloat 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);            will-change: transform;        }        .orb-1 { width: 70vw; height: 70vw; background: #5c24ff; top: -20vh; left: -20vw; }        .orb-2 { width: 80vw; height: 80vw; background: #0088ff; bottom: -30vh; right: -20vw; animation-delay: -5s; opacity: 0.3; }        .orb-3 { width: 50vw; height: 50vw; background: #ff2a85; top: 40vh; left: 30vw; animation-delay: -10s; opacity: 0.2; }        @keyframes fluidFloat {            0% { transform: translate(0, 0) scale(1) rotate(0deg); }            50% { transform: translate(10vw, 15vh) scale(1.1) rotate(45deg); }            100% { transform: translate(-5vw, 20vh) scale(0.9) rotate(90deg); }        }        /* 2. 电影胶片噪点蒙版 (增加真实质感，去除数码廉价感) */        .noise-overlay {            position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: 0.06;            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");        }        .container {            max-width: 440px; /* 进一步收窄，打造完美黄金比例修长感 */            width: 100%; z-index: 10;        }        /* 3. 极简悬浮头像与渐变字 */        .profile { text-align: center; margin-bottom: 35px; }        .avatar-wrap {            position: relative; width: 88px; height: 88px; margin: 0 auto 16px;            border-radius: 50%; padding: 3px;            /* 头像外圈微光旋转呼吸 */            background: linear-gradient(135deg, rgba(255,255,255,0.4), rgba(255,255,255,0.05));            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 40px rgba(92, 36, 255, 0.4);            animation: floatAvatar 6s ease-in-out infinite;        }        @keyframes floatAvatar {            0%, 100% { transform: translateY(0); }            50% { transform: translateY(-8px); }        }        .avatar {            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;            border: 2px solid #050507; /* 内嵌暗边，增加立体层级 */        }                .profile h1 {            font-size: 22px; font-weight: 600; letter-spacing: 0.5px;            /* 高级金属拉丝渐变字 */            background: linear-gradient(to bottom right, #ffffff, #a1a1aa);            -webkit-background-clip: text; -webkit-text-fill-color: transparent;            margin-bottom: 6px;        }        .profile p { font-size: 13px; color: var(--text-secondary); letter-spacing: 0.5px; font-weight: 400;}        /* 小巧精致的分类标题 */        .section-title {            font-size: 12px; color: #71717a; font-weight: 600;            margin: 32px 0 12px 14px; letter-spacing: 2px; text-transform: uppercase;        }        /* 4. 极致细腻的毛玻璃卡片核心设计 (The Masterpiece) */        .glass-card {            display: flex; align-items: center; gap: 16px;            background: var(--glass-bg);            backdrop-filter: blur(24px) saturate(150%); /* 高饱和度透光底色 */            -webkit-backdrop-filter: blur(24px) saturate(150%);            border: 1px solid var(--glass-border);            border-radius: 20px; /* 现代圆润倒角 */            padding: 16px 20px; margin-bottom: 14px;            text-decoration: none; position: relative; overflow: hidden;            box-shadow: 0 8px 24px rgba(0,0,0,0.3), var(--glass-highlight); /* 顶部边缘高光 */                        /* 分离按下与恢复的过渡动画，营造绝佳手感 */            transition: transform 0.4s var(--spring-bounce), background 0.3s ease, border-color 0.3s ease;            cursor: pointer;        }        /* ⭐ 移动端灵魂：按压瞬间的真实物理下沉反馈 */        .glass-card:active {            transform: scale(0.95);            background: rgba(255, 255, 255, 0.02); /* 按下时稍微变暗变透 */            transition: transform 0.1s ease; /* 按下瞬间迅速响应，不拖沓 */        }        /* 仅在支持鼠标悬停的设备触发悬浮效果 */        @media (hover: hover) {            .glass-card:hover {                transform: translateY(-4px) scale(1.01);                border-color: rgba(255, 255, 255, 0.2);                background: linear-gradient(145deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);                box-shadow: 0 15px 35px rgba(0,0,0,0.4), var(--glass-highlight), 0 0 20px rgba(255,255,255,0.05);            }        }        /* 图标框体拟物雕琢 */        .icon-box {            width: 44px; height: 44px; border-radius: 14px;            display: flex; justify-content: center; align-items: center; font-size: 20px;            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 4px 10px rgba(0,0,0,0.2);            border: 1px solid rgba(255,255,255,0.05);        }        /* 图标霓虹发光细节 */        .c-xunlei { color: #3b82f6; text-shadow: 0 0 12px rgba(59, 130, 246, 0.6); }        .c-baidu { color: #0ea5e9; text-shadow: 0 0 12px rgba(14, 165, 233, 0.6); }        .c-quark { color: #eab308; text-shadow: 0 0 12px rgba(234, 179, 8, 0.6); }                .card-content { flex: 1; display: flex; flex-direction: column; justify-content: center; }        .card-content h3 { font-size: 16px; color: #fff; margin-bottom: 3px; font-weight: 500; letter-spacing: 0.3px;}        .card-content p { font-size: 12px; color: var(--text-secondary); font-weight: 400;}        /* 提取码标签化身为精致的微型按钮 */        .pwd-tag {            background: rgba(255, 255, 255, 0.06);            border: 1px solid rgba(255, 255, 255, 0.1);            padding: 6px 12px; border-radius: 10px;            font-size: 13px; color: #fff; font-family: "SF Mono", monospace;            display: flex; align-items: center; gap: 6px;            box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);        }        .pwd-tag span { color: #d8b4fe; font-weight: 600; }        .arrow-icon {             color: rgba(255,255,255,0.2); font-size: 14px;             transition: transform 0.3s var(--spring-bounce), color 0.3s ease;         }        .glass-card:active .arrow-icon { transform: translateX(4px); color: #fff; }        /* 广告卡片尊享金流光特效 */        .card-ad {            background: linear-gradient(145deg, rgba(30, 20, 0, 0.6) 0%, rgba(10, 5, 0, 0.4) 100%);            border-color: rgba(255, 215, 0, 0.2);            overflow: hidden;        }        /* 划过广告表面的微秒级流光反光 */        .card-ad::after {            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;            background: linear-gradient(to right, transparent, rgba(255,215,0,0.1), transparent);            transform: skewX(-20deg); animation: shimmer 4s infinite;        }        @keyframes shimmer { 100% { left: 200%; } }        .ad-btn {            background: linear-gradient(135deg, #ffd700, #ff8a00);            color: #451a03; font-size: 12px; font-weight: 700;            padding: 8px 16px; border-radius: 12px;            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.25), inset 0 1px 1px rgba(255,255,255,0.4);        }        /* 5. 苹果级深度毛玻璃弹窗 (Deep Modal) */        .modal-overlay {            position: fixed; inset: 0; z-index: 999;            background: rgba(0, 0, 0, 0.5);             backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);            display: flex; justify-content: center; align-items: center;            opacity: 0; pointer-events: none; transition: opacity 0.4s var(--spring-smooth);        }        .modal-overlay.active { opacity: 1; pointer-events: auto; }                .modal-content {            background: rgba(20, 20, 22, 0.75);             border: 1px solid rgba(255, 255, 255, 0.12);            border-radius: 28px; padding: 32px 24px; text-align: center;             width: 82%; max-width: 310px;            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255, 255, 255, 0.2);                        /* 弹窗呼出的深层物理缩放阻尼 */            transform: scale(0.85) translateY(20px);             opacity: 0;            transition: all 0.5s var(--spring-bounce);        }        .modal-overlay.active .modal-content {             transform: scale(1) translateY(0); opacity: 1;        }        .modal-close {            position: absolute; top: 16px; right: 16px;            width: 32px; height: 32px; border-radius: 50%;            background: rgba(255, 255, 255, 0.08); border: none; color: #fff;            display: flex; justify-content: center; align-items: center; font-size: 14px;            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);            cursor: pointer; transition: transform 0.2s ease, background 0.2s;        }        .modal-close:active { transform: scale(0.9); background: rgba(255,255,255,0.15); }        .modal-content img {             width: 100%; border-radius: 16px; margin-bottom: 20px;             box-shadow: 0 15px 30px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05);        }        .modal-content p { font-size: 14px; color: #e4e4e7; line-height: 1.6; font-weight: 400;}        .modal-content span { color: #a1a1aa; font-size: 12px; margin-top: 8px; display: inline-block; }        /* 6. 进场电影级运镜 (Staggered Animations) */        .stagger {            opacity: 0; transform: translateY(30px);            animation: slideUpFade 0.8s var(--spring-bounce) forwards;        }        @keyframes slideUpFade {            to { opacity: 1; transform: translateY(0); }        }        /* 依次延迟触发 */        .d-1 { animation-delay: 0.1s; } .d-2 { animation-delay: 0.15s; }        .d-3 { animation-delay: 0.2s; } .d-4 { animation-delay: 0.25s; }        .d-5 { animation-delay: 0.3s; } .d-6 { animation-delay: 0.35s; }        .d-7 { animation-delay: 0.4s; } .d-8 { animation-delay: 0.45s; }        .d-9 { animation-delay: 0.5s; }    </style></head><body>    <!-- 底层发光流体引擎与噪点滤镜 -->    <div class="ambient-bg">        <div class="orb orb-1"></div>        <div class="orb orb-2"></div>        <div class="orb orb-3"></div>    </div>    <div class="noise-overlay"></div>    <div class="container">                <!-- 头部 -->        <header class="profile stagger d-1">            <div class="avatar-wrap">                <img src="https://mpimg.cn/view.php/f28d17bf675473cfc2052c50b573504a.jpg" alt="Avatar" class="avatar">            </div>            <h1>阿扶 の 专属小窝</h1>            <p>收集精品资源 · 极速直达</p>        </header>        <!-- 板块一：网盘获取 -->        <div class="section-title stagger d-2">网盘获取</div>                <a href="https://pan.xunlei.com/s/VOmN8AfLWJvU9nLvUFcix9BzA1?pwd=gbqi#" target="_blank" class="glass-card stagger d-3">            <div class="icon-box c-xunlei"><i class="fas fa-bolt"></i></div>            <div class="card-content">                <h3>迅雷云盘</h3>                <p>高速资源节点</p>            </div>            <div class="pwd-tag"><i class="fas fa-key" style="font-size: 11px;"></i> <span>gbqi</span></div>            <i class="fas fa-chevron-right arrow-icon"></i>        </a>        <a href="https://pan.quark.cn/s/55ba917cacaf" target="_blank" class="glass-card stagger d-5">            <div class="icon-box c-quark"><i class="fas fa-q"></i></div>            <div class="card-content">                <h3>夸克网盘</h3>                <p>无密码 · 纯净直通</p>            </div>            <div class="pwd-tag" style="color: var(--text-secondary); background: transparent; border: none; box-shadow: none;">直接访问</div>            <i class="fas fa-chevron-right arrow-icon"></i>        </a>        <!-- 板块二：精选推荐 -->        <div class="section-title stagger d-6">广告位不用管</div>        <a href="https://vip.777haoka.cn/index?k=NUZzQm5EK09Fa0k9" target="_blank" class="glass-card card-ad stagger d-7">            <div class="icon-box" style="color: #ffd700; text-shadow: 0 0 12px rgba(255,215,0,0.5);"><i class="fas fa-sim-card"></i></div>            <div class="card-content">                <h3 style="color: #ffd700;">特惠大流量卡</h3>                <p style="color: #d1b88e;">官方正规卡 / 极速激活发货</p>            </div>            <div class="ad-btn">办理入口</div>        </a>        <!-- 板块三：加入社群与组织 -->        <div class="section-title stagger d-8">加入社群与组织</div>                <a href="https://qm.qq.com/q/TI9HD3JLeQ" target="_blank" class="glass-card stagger d-9">            <div class="icon-box" style="color: #4facfe; text-shadow: 0 0 10px rgba(79,172,254,0.5);"><i class="fab fa-qq"></i></div>            <div class="card-content">                <h3>QQ 交流群</h3>                <p>Tsukifuseの小窝1</p>            </div>            <i class="fas fa-arrow-up-right-from-square arrow-icon"></i>        </a>        <a href="https://t.me/Yukifuse" target="_blank" class="glass-card stagger d-9">            <div class="icon-box" style="color: #00c6ff; text-shadow: 0 0 10px rgba(0,198,255,0.5);"><i class="fab fa-telegram-plane"></i></div>            <div class="card-content">                <h3>Telegram 频道</h3>                <p>@Yukifuse</p>            </div>            <i class="fas fa-arrow-up-right-from-square arrow-icon"></i>        </a>        <div class="glass-card stagger d-9" onclick="openModal('qq')">            <div class="icon-box" style="color: #42C2F4; text-shadow: 0 0 10px rgba(66,194,244,0.5);"><i class="fas fa-satellite-dish"></i></div>            <div class="card-content">                <h3>QQ 频道</h3>                <p>获取最新资讯更新</p>            </div>            <i class="fas fa-qrcode arrow-icon"></i>        </div>        <div class="glass-card stagger d-9" onclick="openModal('wechat')">            <div class="icon-box" style="color: #07C160; text-shadow: 0 0 10px rgba(7,193,96,0.5);"><i class="fab fa-weixin"></i></div>            <div class="card-content">                <h3>微信公众号</h3>                <p>微信专属文章与更新</p>            </div>            <i class="fas fa-qrcode arrow-icon"></i>        </div>    </div>    <!-- 深度模糊弹窗组件 -->    <div id="qrModal" class="modal-overlay">        <div class="modal-content">            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>            <img id="modalImg" src="" alt="二维码">            <p id="modalText"></p>            <span id="modalDate"></span>        </div>    </div>    <script>        const modalData = {            qq: {                img: "https://mpimg.cn/view.php/3eeea91e811340b38fe531330be23928.jpg",                text: "QQ用户可以通过这个获取更新与更多内容",                date: "2026.3.16-18开始更新"            },            wechat: {                img: "https://mpimg.cn/view.php/ee212ca27b5c86473435c0a498eba153.jpg",                text: "微信用户可以通过公众号获取更新与更多内容",                date: "2026.3.16-18开始更新"            }        };        const modal = document.getElementById('qrModal');        function openModal(type) {            document.getElementById('modalImg').src = modalData[type].img;            document.getElementById('modalText').innerText = modalData[type].text;            document.getElementById('modalDate').innerText = modalData[type].date;            // 触发渲染进程强制重排，保证过渡动画触发            modal.style.display = 'flex';            requestAnimationFrame(() => {                modal.classList.add('active');            });        }        function closeModal() {            modal.classList.remove('active');            // 等待动画结束后隐藏            setTimeout(() => {                if(!modal.classList.contains('active')){                    modal.style.display = 'none';                }            }, 400);         }        // 初始化隐藏        modal.style.display = 'none';        // 点击空白处舒适关闭        window.onclick = function(event) {            if (event.target === modal) {                closeModal();            }        }    </script></body></html>
